<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>發生錯誤</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body text-center">
            <h1 class="display-6 text-danger">⚠️ 發生錯誤</h1>
            <p class="lead mt-3" th:text="${message != null ? message : '系統發生錯誤，請稍後再試。'}"></p>
            <a href="/" class="btn btn-primary mt-3">回到首頁</a>
        </div>
    </div>
</div>
</body>
</html>
