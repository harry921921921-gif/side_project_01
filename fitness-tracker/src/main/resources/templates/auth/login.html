<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 · FitTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth">
  <div class="brand"><span class="dot"></span>FitTracker</div>
  <div class="sub">科學化訓練，從記錄開始</div>
  <div class="card">
    <div class="banner err" th:if="${param.error}">帳號或密碼錯誤，請再試一次</div>
    <div class="banner ok" th:if="${param.logout}">你已安全登出</div>
    <div class="banner ok" th:if="${param.registered}">註冊成功，請用新帳號登入</div>
    <h1>歡迎回來</h1>
    <p class="desc">登入以繼續你的訓練計劃</p>
    <form th:action="@{/login}" method="post">
      <div class="fld">
        <label>電子郵件</label>
        <input type="email" name="email" placeholder="name@example.com" autocomplete="email" required>
      </div>
      <div class="fld">
        <label>密碼</label>
        <div class="inwrap">
          <input type="password" name="password" id="pw" placeholder="輸入密碼" autocomplete="current-password" required>
          <button type="button" class="eye" onclick="tp('pw',this)">顯示</button>
        </div>
      </div>
      <div class="row-between">
        <label class="remember"><input type="checkbox" name="remember-me" checked>記住我</label>
        <a class="link" th:href="@{/forgot}">忘記密碼？</a>
      </div>
      <button class="btn" type="submit">登入</button>
    </form>
    <div class="foot">還沒有帳號？ <a class="link" th:href="@{/register}">建立帳號</a></div>
    <div class="secnote">🔒 連線加密傳輸，密碼以 BCrypt 雜湊加鹽保存</div>
  </div>
</div>
<script>function tp(id,b){var e=document.getElementById(id);var s=e.type==='password';e.type=s?'text':'password';b.textContent=s?'隱藏':'顯示';}</script>
</body></html>
