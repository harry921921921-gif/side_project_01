<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <div class="d-flex align-items-center gap-3">
            <a class="navbar-brand fw-bold m-0" th:href="@{/}">💪 FitTracker</a>
            <span class="navbar-text m-0" style="color:rgba(255,255,255,.75)" th:if="${currentUser}">
                👋 Hi，<span th:text="${currentUser.displayName}">會員</span>
            </span>
        </div>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">🏠 首頁</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/workout}">🏋️ 訓練紀錄</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/body-weight}">⚖️ 體重紀錄</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/plan}">📋 訓練計劃</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/manage}">⚙️ 管理清單</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" style="margin:0">
                        <button type="submit" class="nav-link btn btn-link text-decoration-none" style="color:rgba(255,255,255,.55)">🚪 登出</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
