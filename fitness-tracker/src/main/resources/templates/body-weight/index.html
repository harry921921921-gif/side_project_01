<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FitTracker - 體重紀錄</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">⚖️ 體重紀錄</h2>

    <!-- 新增體重表單 -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0">➕ 新增今日體重</h5>
        </div>
        <div class="card-body">
            <!--
              th:action="@{/body-weight}" → 表單送到 POST /body-weight
              method="post" → HTTP POST 方法
            -->
            <form th:action="@{/body-weight}" method="post">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">日期</label>
                        <input type="date" name="recordedDate" id="recordedDate"
                               class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">體重 (kg)</label>
                        <input type="number" name="weightKg" class="form-control"
                               step="0.1" min="20" max="300" placeholder="72.5" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">時間點</label>
                        <select name="timeOfDay" class="form-select">
                            <option value="MORNING">☀️ 早上空腹</option>
                            <option value="EVENING">🌙 晚上</option>
                            <option value="OTHER">其他</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">備註（選填）</label>
                        <input type="text" name="note" class="form-control"
                               placeholder="例：運動後、睡前...">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">✔ 儲存體重</button>
            </form>
        </div>
    </div>

    <!-- 歷史紀錄表格 -->
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0">📋 歷史紀錄</h5>
        </div>
        <div class="card-body p-0">
            <div th:if="${records.empty}" class="text-muted text-center p-4">
                尚無紀錄，開始記錄你的體重吧！
            </div>
            <table th:unless="${records.empty}" class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>日期</th>
                        <th>體重</th>
                        <th>時間點</th>
                        <th>備註</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="record : ${records}">
                        <td th:text="${record.recordedDate}"></td>
                        <td>
                            <strong th:text="${record.weightKg} + ' kg'"></strong>
                        </td>
                        <td>
                            <!-- Thymeleaf 三元運算子 -->
                            <span th:text="${record.timeOfDay == 'MORNING' ? '☀️ 早上空腹' :
                                            record.timeOfDay == 'EVENING' ? '🌙 晚上' : '其他'}"></span>
                        </td>
                        <td th:text="${record.note}"></td>
                        <td>
                            <!--
                              th:action="@{/body-weight/delete/{id}(id=${record.id})}"
                              → 動態產生路徑，例如 /body-weight/delete/3
                            -->
                            <form th:action="@{/body-weight/delete/{id}(id=${record.id})}"
                                  method="post"
                                  onsubmit="return confirm('確定刪除這筆紀錄？')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">🗑 刪除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 自動設定日期預設值為今天
    document.getElementById('recordedDate').valueAsDate = new Date();
</script>
</body>
</html>
