<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FitTracker - 體重紀錄</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .chart-card { background:#fff; border-radius:10px; border:1px solid #dee2e6; padding:18px; }
        .view-toggle .btn { min-width:52px; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">⚖️ 體重紀錄</h2>

    <!-- ── 新增紀錄 ── -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-white"><h5 class="mb-0">➕ 新增紀錄</h5></div>
        <div class="card-body">
            <form th:action="@{/body-weight}" method="post">
                <div class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">日期</label>
                        <input type="date" name="recordedDate" id="recordedDate" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">體重 (kg)</label>
                        <input type="number" name="weightKg" class="form-control" step="0.1" min="20" max="300" placeholder="72.5" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">時間點</label>
                        <select name="timeOfDay" class="form-select">
                            <option value="MORNING">☀️ 早上空腹</option>
                            <option value="EVENING">🌙 晚上</option>
                            <option value="OTHER">其他</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">體脂率 (%)</label>
                        <input type="number" name="bodyFatPct" class="form-control" step="0.1" min="1" max="70" placeholder="18.5">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">骨骼肌 (kg)</label>
                        <input type="number" name="skeletalMuscleKg" class="form-control" step="0.1" min="1" max="100" placeholder="35.0">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold">備註</label>
                        <input type="text" name="note" class="form-control" placeholder="運動後、睡前...">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">✔ 儲存</button>
            </form>
        </div>
    </div>

    <!-- ── 體重線圖 ── -->
    <div class="chart-card mb-4 shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h5 class="mb-0">📈 體重趨勢</h5>
            <div class="view-toggle btn-group">
                <button class="btn btn-outline-primary btn-sm active" onclick="setChartView('week', this)">週</button>
                <button class="btn btn-outline-primary btn-sm" onclick="setChartView('month', this)">月</button>
                <button class="btn btn-outline-primary btn-sm" onclick="setChartView('year', this)">年</button>
            </div>
        </div>
        <canvas id="weightChart" height="90"></canvas>
        <div class="row g-2 mt-2 text-center">
            <div class="col-4">
                <div style="font-size:1.4rem;font-weight:700;color:#0d6efd" id="statMin">-</div>
                <div class="text-muted small">最低</div>
            </div>
            <div class="col-4">
                <div style="font-size:1.4rem;font-weight:700;color:#198754" id="statAvg">-</div>
                <div class="text-muted small">平均</div>
            </div>
            <div class="col-4">
                <div style="font-size:1.4rem;font-weight:700;color:#dc3545" id="statMax">-</div>
                <div class="text-muted small">最高</div>
            </div>
        </div>
    </div>

    <!-- ── 骨骼肌 & 體脂率圖表（有資料才顯示） ── -->
    <div class="chart-card mb-4 shadow-sm" id="bodyCompChartCard" style="display:none">
        <h5 class="mb-3">💪 骨骼肌 & 體脂率趨勢（月度記錄）</h5>
        <canvas id="bodyCompChart" height="90"></canvas>
    </div>

    <!-- ── 歷史紀錄 ── -->
    <div class="card shadow-sm">
        <div class="card-header bg-white"><h5 class="mb-0">📋 歷史紀錄</h5></div>
        <div class="card-body p-0">
            <div th:if="${records.empty}" class="text-muted text-center p-4">
                尚無紀錄，開始記錄你的體重吧！
            </div>
            <div th:unless="${records.empty}" class="table-responsive">
                <table class="table table-hover mb-0" style="font-size:.88rem;">
                    <thead class="table-dark">
                        <tr>
                            <th>日期</th><th>體重</th><th>時間點</th>
                            <th>體脂率</th><th>骨骼肌</th><th>備註</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record : ${records}">
                            <td th:text="${record.recordedDate}"></td>
                            <td><strong th:text="${record.weightKg} + ' kg'"></strong></td>
                            <td>
                                <span th:text="${record.timeOfDay == 'MORNING' ? '☀️ 早上空腹' :
                                                record.timeOfDay == 'EVENING' ? '🌙 晚上' : '其他'}"></span>
                            </td>
                            <td th:text="${record.bodyFatPct != null ? record.bodyFatPct + ' %' : '-'}"></td>
                            <td th:text="${record.skeletalMuscleKg != null ? record.skeletalMuscleKg + ' kg' : '-'}"></td>
                            <td th:text="${record.note}"></td>
                            <td>
                                <button class="btn btn-sm btn-outline-secondary"
                                        th:onclick="'toggleBwEdit(' + ${record.id} + ')'">✏️</button>
                                <form th:action="@{/body-weight/delete/{id}(id=${record.id})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('確定刪除這筆紀錄？')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">🗑</button>
                                </form>
                            </td>
                        </tr>
                        <!-- 編輯列 -->
                        <tr th:each="record : ${records}"
                            th:id="'bw-edit-' + ${record.id}"
                            class="table-warning"
                            style="display:none">
                            <td colspan="7">
                                <form th:action="@{/body-weight/update/{id}(id=${record.id})}" method="post">
                                    <div class="row g-2 align-items-end">
                                        <div class="col-md-2">
                                            <label class="form-label small">日期</label>
                                            <input type="date" name="recordedDate" class="form-control form-control-sm"
                                                   th:value="${record.recordedDate}" required>
                                        </div>
                                        <div class="col-md-1">
                                            <label class="form-label small">體重(kg)</label>
                                            <input type="number" name="weightKg" class="form-control form-control-sm"
                                                   th:value="${record.weightKg}" step="0.1" required>
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label small">時間點</label>
                                            <select name="timeOfDay" class="form-select form-select-sm">
                                                <option value="MORNING" th:selected="${record.timeOfDay == 'MORNING'}">☀️ 早上空腹</option>
                                                <option value="EVENING" th:selected="${record.timeOfDay == 'EVENING'}">🌙 晚上</option>
                                                <option value="OTHER"   th:selected="${record.timeOfDay == 'OTHER'}">其他</option>
                                            </select>
                                        </div>
                                        <div class="col-md-1">
                                            <label class="form-label small">體脂%</label>
                                            <input type="number" name="bodyFatPct" class="form-control form-control-sm"
                                                   th:value="${record.bodyFatPct}" step="0.1">
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label small">骨骼肌(kg)</label>
                                            <input type="number" name="skeletalMuscleKg" class="form-control form-control-sm"
                                                   th:value="${record.skeletalMuscleKg}" step="0.1">
                                        </div>
                                        <div class="col-md-2">
                                            <label class="form-label small">備註</label>
                                            <input type="text" name="note" class="form-control form-control-sm"
                                                   th:value="${record.note}">
                                        </div>
                                        <div class="col-md-2 d-flex gap-1">
                                            <button type="submit" class="btn btn-success btn-sm">💾</button>
                                            <button type="button" class="btn btn-secondary btn-sm"
                                                    th:onclick="'toggleBwEdit(' + ${record.id} + ')'">取消</button>
                                        </div>
                                    </div>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.getElementById('recordedDate').valueAsDate = new Date();

    // Thymeleaf 直接將 List<Map> 轉成 JS 陣列（降冪排列）
    const rawData = /*[[${chartData}]]*/ [];

    // 升冪（圖表需要時間從舊到新）
    const ascData = [...rawData].reverse();

    function toggleBwEdit(id) {
        const row = document.getElementById('bw-edit-' + id);
        row.style.display = (row.style.display === 'none') ? '' : 'none';
    }

    // ── 選每日代表體重：優先 MORNING，其次當天任一筆 ──────
    function buildDayMap(arr) {
        const map = new Map();
        arr.forEach(r => {
            const existing = map.get(r.date);
            if (!existing || r.timeOfDay === 'MORNING') {
                map.set(r.date, r.weight);
            }
        });
        return map;
    }

    // ── 週視圖：本週一到本週日 ────────────────────────────
    function getWeekData() {
        const today = new Date();
        const todayStr = today.toISOString().slice(0, 10);
        const dow = today.getDay(); // 0=Sun
        const monday = new Date(today);
        monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));

        const dayNames = ['一','二','三','四','五','六','日'];
        const labels = [], weights = [];
        const dayMap = buildDayMap(ascData);
        let lastKnown = null;

        for (let i = 0; i < 7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            const dateStr = d.toISOString().slice(0, 10);
            labels.push(dayNames[i] + ' ' + dateStr.slice(5));
            let w = dayMap.get(dateStr);
            if (w == null) {
                // 只往前帶入（過去空白日補上一次數值），未來還沒到的日期留空
                w = (dateStr <= todayStr) ? lastKnown : null;
            } else {
                lastKnown = w;
            }
            weights.push(w);
        }
        return { labels, weights };
    }

    // ── 月視圖：本月 1 日到最後一日 ──────────────────────
    function getMonthData() {
        const today = new Date();
        const todayStr = today.toISOString().slice(0, 10);
        const year  = today.getFullYear();
        const month = today.getMonth(); // 0-based
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const labels = [], weights = [];
        const dayMap = buildDayMap(ascData);
        let lastKnown = null;

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = year + '-'
                + String(month + 1).padStart(2, '0') + '-'
                + String(d).padStart(2, '0');
            labels.push(d + '日');
            let w = dayMap.get(dateStr);
            if (w == null) {
                // 只往前帶入（過去空白日補上一次數值），未來還沒到的日期留空
                w = (dateStr <= todayStr) ? lastKnown : null;
            } else {
                lastKnown = w;
            }
            weights.push(w);
        }
        return { labels, weights };
    }

    // ── 年視圖：近 12 個月，每月取最後一筆 ──────────────
    function getYearData() {
        const today = new Date();
        const labels = [], weights = [];
        for (let i = 11; i >= 0; i--) {
            const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
            const prefix = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
            labels.push(prefix);
            const monthRecs = ascData.filter(r => r.date.startsWith(prefix));
            if (monthRecs.length) {
                weights.push(monthRecs[monthRecs.length - 1].weight);
            } else {
                const prev = ascData.filter(r => r.date < prefix + '-01');
                weights.push(prev.length ? prev[prev.length - 1].weight : null);
            }
        }
        return { labels, weights };
    }

    // ── Chart.js 體重圖 ───────────────────────────────────
    const weightCtx = document.getElementById('weightChart').getContext('2d');
    let weightChart = null;

    function buildWeightChart(data, range) {
        const valid = data.weights.filter(w => w != null);
        // Y 軸固定範圍：以本次視圖第一筆實際輸入的體重為基準，往上下各留 range 公斤，
        // 避免小幅度變化因軸距過窄而被畫成陡峭的線
        const baseline = valid.length ? valid[0] : null;
        if (weightChart) weightChart.destroy();
        weightChart = new Chart(weightCtx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [{
                    label: '體重 (kg)',
                    data: data.weights,
                    borderColor: '#0d6efd',
                    backgroundColor: 'rgba(13,110,253,.08)',
                    pointBackgroundColor: '#0d6efd',
                    tension: 0,        // 直線連接（點到點）
                    fill: true,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    spanGaps: true     // 缺資料日期跨過去連線
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        beginAtZero: false,
                        min: baseline != null ? baseline - range : undefined,
                        max: baseline != null ? baseline + range : undefined,
                        ticks: { callback: v => v + ' kg' }
                    }
                }
            }
        });
        // 統計
        if (valid.length) {
            document.getElementById('statMin').textContent = Math.min(...valid).toFixed(1) + ' kg';
            document.getElementById('statMax').textContent = Math.max(...valid).toFixed(1) + ' kg';
            document.getElementById('statAvg').textContent =
                (valid.reduce((a,b) => a+b, 0) / valid.length).toFixed(1) + ' kg';
        }
    }

    function setChartView(view, btn) {
        document.querySelectorAll('.view-toggle .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const data = view === 'week' ? getWeekData()
                   : view === 'month' ? getMonthData()
                   : getYearData();
        const range = view === 'week' ? 5 : view === 'month' ? 10 : 20;
        buildWeightChart(data, range);
    }

    // ── Chart.js 骨骼肌 & 體脂率圖（每次有測量值才出現）──
    function buildBodyCompChart() {
        // 只取有 muscle 或 bodyFat 的紀錄，升冪
        const compRecs = ascData.filter(r => r.muscle != null || r.bodyFat != null);
        if (!compRecs.length) return;

        document.getElementById('bodyCompChartCard').style.display = '';
        const labels  = compRecs.map(r => r.date.slice(0, 7)); // YYYY-MM
        const muscles = compRecs.map(r => r.muscle);
        const fats    = compRecs.map(r => r.bodyFat);

        const ctx = document.getElementById('bodyCompChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: '骨骼肌 (kg)',
                        data: muscles,
                        borderColor: '#198754',
                        backgroundColor: 'rgba(25,135,84,.08)',
                        pointBackgroundColor: '#198754',
                        tension: 0,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        spanGaps: true,
                        yAxisID: 'yMuscle'
                    },
                    {
                        label: '體脂率 (%)',
                        data: fats,
                        borderColor: '#dc3545',
                        backgroundColor: 'rgba(220,53,69,.08)',
                        pointBackgroundColor: '#dc3545',
                        tension: 0,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        spanGaps: true,
                        yAxisID: 'yFat'
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: true, position: 'top' }
                },
                scales: {
                    yMuscle: {
                        type: 'linear',
                        position: 'left',
                        beginAtZero: false,
                        ticks: { callback: v => v + ' kg', color: '#198754' },
                        title: { display: true, text: '骨骼肌 (kg)', color: '#198754' }
                    },
                    yFat: {
                        type: 'linear',
                        position: 'right',
                        beginAtZero: false,
                        ticks: { callback: v => v + ' %', color: '#dc3545' },
                        title: { display: true, text: '體脂率 (%)', color: '#dc3545' },
                        grid: { drawOnChartArea: false }
                    }
                }
            }
        });
    }

    // 初始渲染
    buildWeightChart(getWeekData(), 5);
    buildBodyCompChart();
</script>
</body>
</html>
