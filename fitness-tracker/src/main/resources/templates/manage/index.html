<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FitTracker - 管理清單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .preset-badge { font-size:.68rem; }
        .drag-handle { cursor: default; color:#adb5bd; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">⚙️ 管理清單</h2>

    <div class="row g-4">

        <!-- ── 訓練部位 ── -->
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">🏷️ 訓練部位</h5>
                    <span class="badge bg-secondary" th:text="${#lists.size(bodyParts)} + ' 個'"></span>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <tbody>
                            <tr th:each="bp, iter : ${bodyParts}">
                                <td class="drag-handle ps-3" style="width:30px">☰</td>
                                <td class="fw-semibold" th:text="${bp.name}"></td>
                                <td>
                                    <span th:if="${bp.preset}" class="badge bg-light text-muted preset-badge">預設</span>
                                    <span th:unless="${bp.preset}" class="badge bg-info text-dark preset-badge">自訂</span>
                                </td>
                                <td class="text-end pe-3">
                                    <!-- 上移 -->
                                    <form th:if="${!iter.first}" th:action="@{/manage/body-part/move-up/{id}(id=${bp.id})}" method="post" class="d-inline">
                                        <button class="btn btn-sm btn-outline-secondary py-0 px-1">▲</button>
                                    </form>
                                    <!-- 下移 -->
                                    <form th:if="${!iter.last}" th:action="@{/manage/body-part/move-down/{id}(id=${bp.id})}" method="post" class="d-inline">
                                        <button class="btn btn-sm btn-outline-secondary py-0 px-1">▼</button>
                                    </form>
                                    <!-- 刪除（自訂才能刪） -->
                                    <form th:unless="${bp.preset}" th:action="@{/manage/body-part/delete/{id}(id=${bp.id})}" method="post" class="d-inline"
                                          onsubmit="return confirm('確定刪除此部位？')">
                                        <button class="btn btn-sm btn-outline-danger py-0 px-1">✕</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white">
                    <form th:action="@{/manage/body-part/add}" method="post" class="d-flex gap-2">
                        <input type="text" name="name" class="form-control form-control-sm"
                               placeholder="新增部位名稱（如：上半身）" required>
                        <button class="btn btn-primary btn-sm text-nowrap">＋ 新增</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ── 訓練動作 ── -->
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h5 class="mb-0">🏋️ 訓練動作庫</h5>
                    <div class="d-flex align-items-center gap-2">
                        <label class="form-label mb-0 small text-muted">篩選部位：</label>
                        <select id="filterBodyPart" class="form-select form-select-sm" style="width:120px" onchange="filterExercises()">
                            <option value="">全部</option>
                            <option th:each="bp : ${bodyParts}" th:value="${bp.name}" th:text="${bp.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="card-body p-0" style="max-height:450px; overflow-y:auto;">
                    <table class="table table-hover table-sm mb-0">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th class="ps-3">動作名稱</th>
                                <th>部位</th>
                                <th>類型</th>
                                <th class="text-end pe-3">操作</th>
                            </tr>
                        </thead>
                        <tbody id="exerciseTableBody">
                            <tr th:each="ex, iter : ${exercises}"
                                th:data-bodypart="${ex.bodyPart}"
                                class="exercise-row">
                                <td class="ps-3 fw-semibold" th:text="${ex.name}"></td>
                                <td>
                                    <span class="badge bg-primary" style="font-size:.72rem" th:text="${ex.bodyPart}"></span>
                                </td>
                                <td>
                                    <span class="badge bg-light text-dark" style="font-size:.68rem" th:text="${ex.category}"></span>
                                    <span th:if="${ex.preset}" class="badge bg-light text-muted preset-badge ms-1">預設</span>
                                </td>
                                <td class="text-end pe-3">
                                    <form th:action="@{/manage/exercise/move-up/{id}(id=${ex.id})}" method="post" class="d-inline">
                                        <button class="btn btn-sm btn-outline-secondary py-0 px-1">▲</button>
                                    </form>
                                    <form th:action="@{/manage/exercise/move-down/{id}(id=${ex.id})}" method="post" class="d-inline">
                                        <button class="btn btn-sm btn-outline-secondary py-0 px-1">▼</button>
                                    </form>
                                    <form th:unless="${ex.preset}" th:action="@{/manage/exercise/delete/{id}(id=${ex.id})}" method="post" class="d-inline"
                                          onsubmit="return confirm('確定刪除此動作？')">
                                        <button class="btn btn-sm btn-outline-danger py-0 px-1">✕</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white">
                    <form th:action="@{/manage/exercise/add}" method="post">
                        <div class="row g-2">
                            <div class="col-md-4">
                                <input type="text" name="name" class="form-control form-control-sm"
                                       placeholder="動作名稱" required>
                            </div>
                            <div class="col-md-3">
                                <select name="bodyPart" class="form-select form-select-sm" required>
                                    <option value="">選擇部位</option>
                                    <option th:each="bp : ${bodyParts}" th:value="${bp.name}" th:text="${bp.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select name="category" class="form-select form-select-sm">
                                    <option value="COMPOUND">複合動作</option>
                                    <option value="ISOLATION">孤立動作</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-primary btn-sm w-100">＋ 新增</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function filterExercises() {
        const val = document.getElementById('filterBodyPart').value;
        document.querySelectorAll('.exercise-row').forEach(row => {
            row.style.display = (!val || row.dataset.bodypart === val) ? '' : 'none';
        });
    }
</script>
</body>
</html>
