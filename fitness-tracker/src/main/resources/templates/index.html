<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FitTracker - 首頁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 引入 navbar fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-4">📊 Dashboard</h2>

    <!-- 統計卡片 -->
    <div class="row g-3 mb-4">

        <!-- 最新體重 -->
        <div class="col-md-4">
            <div class="card text-white bg-primary h-100">
                <div class="card-body">
                    <h6 class="card-title">⚖️ 最新體重</h6>
                    <!-- th:if：有資料才顯示 -->
                    <h3 th:if="${lastWeight}" th:text="${lastWeight.weightKg} + ' kg'">-- kg</h3>
                    <p  th:if="${lastWeight}" th:text="${lastWeight.recordedDate}" class="mb-0 opacity-75"></p>
                    <!-- th:unless：沒有資料時顯示 -->
                    <h3 th:unless="${lastWeight}">尚未紀錄</h3>
                </div>
                <div class="card-footer">
                    <a th:href="@{/body-weight}" class="text-white text-decoration-none small">前往記錄 →</a>
                </div>
            </div>
        </div>

        <!-- 本週訓練次數 -->
        <div class="col-md-4">
            <div class="card text-white bg-success h-100">
                <div class="card-body">
                    <h6 class="card-title">🏋️ 本週訓練</h6>
                    <!-- th:text：輸出變數值 -->
                    <h3 th:text="${weeklyCount} + ' 次'">0 次</h3>
                    <p class="mb-0 opacity-75">本週已完成</p>
                </div>
                <div class="card-footer">
                    <a th:href="@{/workout}" class="text-white text-decoration-none small">前往記錄 →</a>
                </div>
            </div>
        </div>

        <!-- 訓練計劃 -->
        <div class="col-md-4">
            <div class="card text-white bg-warning h-100">
                <div class="card-body">
                    <h6 class="card-title">🎯 訓練計劃</h6>
                    <h3>開始規劃</h3>
                    <p class="mb-0 opacity-75">依週期自動排課表</p>
                </div>
                <div class="card-footer">
                    <a th:href="@{/plan}" class="text-white text-decoration-none small">前往規劃 →</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 訓練統計 -->
    <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">📈 訓練統計</h5></div>
        <div class="card-body">
            <div class="row g-3 mb-3 text-center">
                <div class="col-6">
                    <div class="fw-bold fs-5" th:text="${dashboardStats.weeklyCount} + ' 次'">0 次</div>
                    <div class="text-muted small">本週訓練次數</div>
                </div>
                <div class="col-6">
                    <div class="fw-bold fs-5"
                         th:text="${dashboardStats.avgRpe != null ? #numbers.formatDecimal(dashboardStats.avgRpe, 1, 1) : '-'}">-</div>
                    <div class="text-muted small">近 7 天平均 RPE</div>
                </div>
            </div>
            <div class="mb-3">
                <div class="small fw-semibold text-muted mb-1">近 7 天複合動作訓練量（依部位分開計算）</div>
                <div th:if="${dashboardStats.weeklyVolumeByBodyPart.empty}" class="text-muted small">
                    近 7 天沒有健力三項、引體向上等複合式動作紀錄
                </div>
                <div th:each="v : ${dashboardStats.weeklyVolumeByBodyPart}"
                     class="d-flex justify-content-between align-items-center small border-bottom py-1">
                    <span class="badge bg-secondary" th:text="${v.bodyPart}"></span>
                    <span class="fw-semibold" th:text="${#numbers.formatDecimal(v.volume, 1, 0)} + ' kg'"></span>
                </div>
            </div>
            <p class="small text-muted mb-3" th:text="'最近一次訓練：' + ${dashboardStats.lastSessionSummary}"></p>
            <div th:if="${!dashboardStats.recentCompletions.empty}">
                <div class="small fw-semibold text-muted mb-1">最近 3 次完成率</div>
                <div th:each="c : ${dashboardStats.recentCompletions}"
                     class="d-flex justify-content-between align-items-center small border-bottom py-1">
                    <span th:text="${c.date} + (${c.bodyPart} != null ? ' ' + ${c.bodyPart} : '')"></span>
                    <span th:if="${c.completionPct != null}" class="badge bg-success" th:text="${c.completionPct} + '%'"></span>
                    <span th:unless="${c.completionPct != null}" class="badge bg-secondary">無資料</span>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 建議 -->
    <div class="card mb-4">
        <div class="card-header"><h5 class="mb-0">🤖 AI 建議</h5></div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(suggestions)}" class="alert alert-secondary mb-0">
                目前沒有特別建議，保持節奏 👍
            </div>
            <div th:unless="${#lists.isEmpty(suggestions)}">
                <div th:each="s : ${suggestions}" class="alert mb-2"
                     th:classappend="${s.level == 'INFO' ? 'alert-info' : (s.level == 'WARN' ? 'alert-warning' : 'alert-danger')}">
                    <strong th:text="${s.exerciseName} + '：'">動作：</strong>
                    <span th:text="${s.message}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 最近訓練紀錄 -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">📋 最近訓練紀錄</h5>
            <a th:href="@{/workout}" class="btn btn-sm btn-outline-primary">查看全部</a>
        </div>
        <div class="card-body">
            <div th:if="${recentWorkouts.empty}" class="text-muted text-center py-3">
                <p>尚未有訓練紀錄</p>
                <a th:href="@{/workout}" class="btn btn-primary">開始記錄 💪</a>
            </div>

            <!-- th:each：迴圈，類似 for-each -->
            <div th:unless="${recentWorkouts.empty}">
                <div th:each="ws : ${recentWorkouts}" class="border-bottom pb-2 mb-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong th:text="${ws.workoutDate}">日期</strong>
                        <span class="badge bg-secondary" th:text="${ws.bodyPart}">部位</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
